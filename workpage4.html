<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker · work</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f2f6fc;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #eef2f7;
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 650;
            color: #0b1f33;
            letter-spacing: -0.3px;
        }
        .header h1 i {
            color: #1f6fdf;
            margin-right: 0.4rem;
        }
        .header-actions {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #d0dae8;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1f3a5e;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-outline:hover {
            background: #eef4fc;
            border-color: #a0b6d4;
        }
        .logout-btn {
            background: #fce9e6;
            border: 1px solid #f3cdc7;
            color: #a14232;
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .logout-btn:hover {
            background: #fad6d0;
        }

        /* 3 stats boxes */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.8rem 0 2.2rem;
        }
        .stat-box {
            background: #f9fcff;
            padding: 1.2rem 0.5rem;
            border-radius: 1.8rem;
            text-align: center;
            border: 1px solid #e8eff6;
            transition: 0.1s;
        }
        .stat-box .num {
            font-size: 2.4rem;
            font-weight: 700;
            color: #0a253f;
            line-height: 1.2;
        }
        .stat-box .label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #4e6a8a;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-top: 0.2rem;
        }
        .stat-box .icon {
            font-size: 1.4rem;
            color: #1f6fdf;
            margin-bottom: 0.2rem;
        }
        .stat-box.total .num { color: #1a4c7a; }
        .stat-box.viewed .num { color: #b4690e; }
        .stat-box.balance .num { color: #1a7a44; }

        .badge-secret {
            background: #e9f0f8;
            display: inline-block;
            padding: 0.25rem 1.5rem;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #1b3d62;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        /* url cards – one by one, clean */
        .urls-container {
            margin-top: 1.8rem;
        }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .section-title h2 {
            font-size: 1.2rem;
            color: #0b1f33;
            font-weight: 600;
        }
        .section-title span {
            color: #58738f;
            font-size: 0.9rem;
        }

        .url-card {
            background: #fafdff;
            border: 1px solid #e6edf6;
            border-radius: 1.2rem;
            padding: 1rem 1.4rem;
            margin-bottom: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem 1rem;
            transition: 0.1s ease;
        }
        .url-card:hover {
            border-color: #b8cee9;
            background: #f8fcff;
        }
        .url-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1 1 200px;
            min-width: 180px;
        }
        .slno-badge {
            background: #1f6fdf;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .url-meta {
            flex: 1;
        }
        .url-meta .id-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: #6f89a7;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .url-meta .url-text {
            font-weight: 500;
            color: #0b1f33;
            word-break: break-all;
            font-size: 0.95rem;
        }
        .url-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .click-badge {
            background: #eef4fa;
            padding: 0.25rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1d3f61;
            white-space: nowrap;
        }
        .click-badge i {
            color: #1f6fdf;
            margin-right: 0.2rem;
        }
        .visit-btn {
            background: #1f6fdf;
            border: none;
            color: white;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
            text-decoration: none;
        }
        .visit-btn:hover:not(:disabled) {
            background: #1453b3;
            transform: scale(0.97);
        }
        .visit-btn:disabled {
            opacity: 0.7;
            cursor: default;
            background: #8faccf;
            transform: none;
        }
        .visit-btn.visited {
            background: #28a745;
        }
        .visit-btn.visited:disabled {
            background: #8fc9a0;
            opacity: 0.8;
        }

        .click-detail-mini {
            font-size: 0.7rem;
            color: #42607e;
            margin-top: 0.2rem;
            border-left: 3px solid #1f6fdf;
            padding-left: 0.6rem;
            background: #f3f8fe;
            border-radius: 0 0.4rem 0.4rem 0;
            width: 100%;
        }
        .click-detail-mini span {
            margin-right: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #627b99;
        }
        .empty-state i {
            font-size: 3rem;
            color: #cddbe9;
            margin-bottom: 0.8rem;
        }
        .empty-state h3 {
            color: #0b1f33;
            font-weight: 500;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #0b1f33;
            color: white;
            padding: 1rem 1.6rem;
            border-radius: 1.2rem;
            max-width: 380px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.25s ease;
            z-index: 999;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success { background: #1f7a3d; }
        .toast.error { background: #b13e2e; }
        .toast .toast-title { font-weight: 600; margin-bottom: 0.2rem; }
        .toast .toast-detail { font-size: 0.8rem; opacity: 0.9; }

        .hidden { display: none; }
        .loading {
            text-align: center;
            padding: 2.5rem;
            color: #3b5e82;
        }
        .error-box {
            background: #fce9e6;
            color: #a14232;
            padding: 0.9rem 1.2rem;
            border-radius: 1.2rem;
            margin: 1rem 0;
        }
        .success-msg {
            background: #d9f0e1;
            color: #146c3a;
            padding: 0.9rem 1.2rem;
            border-radius: 1.2rem;
            margin: 1rem 0;
        }

        @media (max-width: 650px) {
            .container { padding: 1.5rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .url-card { flex-direction: column; align-items: stretch; }
            .url-left { flex-wrap: wrap; }
            .url-right { justify-content: space-between; width: 100%; }
            .visit-btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- header -->
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> work·track</h1>
        <div class="header-actions">
            <button class="btn-outline" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- loading -->
    <div id="loading" class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>

    <!-- stats -->
    <div id="statsContainer" class="hidden">
        <div class="stats-grid">
            <div class="stat-box total">
                <div class="icon"><i class="fas fa-layer-group"></i></div>
                <div class="num" id="totalUrls">0</div>
                <div class="label">Total</div>
            </div>
            <div class="stat-box viewed">
                <div class="icon"><i class="fas fa-eye"></i></div>
                <div class="num" id="viewedUrls">0</div>
                <div class="label">Viewed</div>
            </div>
            <div class="stat-box balance">
                <div class="icon"><i class="fas fa-arrow-right"></i></div>
                <div class="num" id="balanceUrls">0</div>
                <div class="label">Balance</div>
            </div>
        </div>
        <div style="text-align:center;"><span class="badge-secret">🔐 <span id="secretDisplay">---</span></span></div>
    </div>

    <!-- error / success -->
    <div id="error" class="error-box hidden"></div>
    <div id="successMsg" class="success-msg hidden"></div>

    <!-- url list -->
    <div id="urlsContainer" class="hidden">
        <div class="section-title">
            <h2><i class="fas fa-list-ul"></i> URLs</h2>
            <span id="urlCount">0 items</span>
        </div>
        <div id="urlsList"></div>
    </div>
</div>

<!-- toast -->
<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
<script>
    (function() {
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzoHGVIEEmpOf2S8arfC7EaY-DLHo4IwebJHA-2OstNfD6ulQf0aj4DeHecN-B4xRmq/exec';

        // DOM refs
        const loadingEl = document.getElementById('loading');
        const statsContainer = document.getElementById('statsContainer');
        const urlsContainer = document.getElementById('urlsContainer');
        const urlsList = document.getElementById('urlsList');
        const errorEl = document.getElementById('error');
        const successMsg = document.getElementById('successMsg');
        const totalEl = document.getElementById('totalUrls');
        const viewedEl = document.getElementById('viewedUrls');
        const balanceEl = document.getElementById('balanceUrls');
        const urlCount = document.getElementById('urlCount');
        const secretDisplay = document.getElementById('secretDisplay');
        const toast = document.getElementById('toast');

        let allItems = [];
        let userData = null;
        let viewedSet = new Set();        // slNo strings
        let clickHistory = {};

        // ---- toast ----
        let toastTimer = null;
        function showToast(message, type = 'success', detail = '') {
            if (toastTimer) clearTimeout(toastTimer);
            let html = `<div class="toast-title">${message}</div>`;
            if (detail) html += `<div class="toast-detail">${detail}</div>`;
            toast.innerHTML = html;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.classList.add('show'), 20);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ---- fetch & render ----
        async function fetchData(secret) {
            try {
                loadingEl.classList.remove('hidden');
                const resp = await fetch(`${WEB_APP_URL}?secretcode=${encodeURIComponent(secret)}`);
                const data = await resp.json();
                loadingEl.classList.add('hidden');

                if (!data.success) {
                    showError('Invalid secret or error: ' + (data.error || 'unknown'));
                    setTimeout(() => window.location.href = 'https://workfrommobile.pages.dev/', 2500);
                    return;
                }

                // update state
                userData = data.userData;
                allItems = data.items || [];

                // viewedSet: from user sheet (isViewed flag)
                viewedSet.clear();
                if (data.items) {
                    data.items.forEach(item => {
                        if (item.isViewed === true) viewedSet.add(item.slNo);
                    });
                }

                // stats from userData (or fallback)
                totalEl.textContent = userData?.total ?? data.totalUrls ?? allItems.length;
                viewedEl.textContent = userData?.viewed ?? viewedSet.size;
                const total = parseInt(totalEl.textContent) || 0;
                const viewed = parseInt(viewedEl.textContent) || 0;
                balanceEl.textContent = total - viewed;
                secretDisplay.textContent = secret.substring(0, 6) + '••••';

                statsContainer.classList.remove('hidden');

                if (allItems.length === 0) {
                    urlsList.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h3>No URLs</h3><p>Sheet2 is empty.</p></div>`;
                    urlsContainer.classList.remove('hidden');
                    urlCount.textContent = '0 items';
                    return;
                }

                renderUrls(allItems);
                urlsContainer.classList.remove('hidden');
            } catch (err) {
                loadingEl.classList.add('hidden');
                showError('Network error: ' + err.message);
            }
        }

        function renderUrls(items) {
            urlCount.textContent = `${items.length} items`;
            let html = '';
            // sort: viewed items go to bottom
            const sorted = [...items].sort((a, b) => {
                const aView = viewedSet.has(a.slNo) ? 1 : 0;
                const bView = viewedSet.has(b.slNo) ? 1 : 0;
                return aView - bView;   // unviewed first, viewed last
            });

            sorted.forEach(item => {
                const slNo = item.slNo;
                const isViewed = viewedSet.has(slNo);
                const url = item.url.startsWith('http') ? item.url : `https://${item.url}`;
                const history = clickHistory[slNo] || null;

                let detailHtml = '';
                if (history) {
                    detailHtml = `
                        <div class="click-detail-mini">
                            <span>📅 ${history.date}</span>
                            <span>⏱ ${history.time}</span>
                            <span>🔄 ${history.clicks} clicks</span>
                        </div>
                    `;
                }

                // button: if viewed => disabled with "Viewed" label, else "Visit"
                let btnHtml = '';
                if (isViewed) {
                    btnHtml = `
                        <button class="visit-btn visited" disabled>
                            <i class="fas fa-check-circle"></i> Viewed
                        </button>
                    `;
                } else {
                    btnHtml = `
                        <button class="visit-btn" onclick="handleClick('${slNo}', '${item.id}', '${item.url}')">
                            <i class="fas fa-external-link-alt"></i> Click
                        </button>
                    `;
                }

                html += `
                    <div class="url-card" data-slno="${slNo}">
                        <div class="url-left">
                            <div class="slno-badge">${slNo}</div>
                            <div class="url-meta">
                                <div class="id-label">ID: ${item.id}</div>
                                <div class="url-text">${item.url}</div>
                                ${detailHtml}
                            </div>
                        </div>
                        <div class="url-right">
                            <span class="click-badge"><i class="fas fa-mouse-pointer"></i> <span id="clickCount_${slNo}">${item.clicks || 0}</span></span>
                            ${btnHtml}
                        </div>
                    </div>
                `;
            });

            urlsList.innerHTML = html;
        }

        // ---- handle click ----
        window.handleClick = async function(slNo, id, url) {
            const params = new URLSearchParams(window.location.search);
            const secret = params.get('secretcode');
            if (!secret) return;

            // disable button to avoid double
            const card = document.querySelector(`.url-card[data-slno="${slNo}"]`);
            const btn = card?.querySelector('.visit-btn');
            if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }

            try {
                // 1) track click
                const trackResp = await fetch(`${WEB_APP_URL}?action=track&secretcode=${encodeURIComponent(secret)}&slno=${encodeURIComponent(slNo)}`);
                const trackData = await trackResp.json();

                if (!trackData.success) {
                    showToast('Track error: ' + (trackData.error || 'unknown'), 'error');
                    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
                    return;
                }

                // 2) update view count in Sheet1 (action=view)
                const viewResp = await fetch(`${WEB_APP_URL}?action=view&secretcode=${encodeURIComponent(secret)}`);
                const viewData = await viewResp.json();

                // 3) update UI
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                // update click count on card
                const clickSpan = document.getElementById(`clickCount_${slNo}`);
                const newCount = trackData.clicks || 1;
                if (clickSpan) clickSpan.textContent = newCount;

                // store history
                clickHistory[slNo] = { date: dateStr, time: timeStr, clicks: newCount };

                // mark as viewed locally
                viewedSet.add(slNo);

                // update stats
                const total = parseInt(totalEl.textContent) || 0;
                const viewed = parseInt(viewedEl.textContent) || 0;
                viewedEl.textContent = viewed + 1;
                balanceEl.textContent = total - (viewed + 1);

                // re-render (to move card to bottom, update button)
                renderUrls(allItems);

                // show toast with details
                const detailMsg = `SL ${slNo} · ${timeStr}`;
                showToast(`✓ Click recorded`, 'success', detailMsg);

                // open url in new tab
                const fullUrl = url.startsWith('http') ? url : `https://${url}`;
                setTimeout(() => window.open(fullUrl, '_blank'), 350);

            } catch (err) {
                showToast('Error: ' + err.message, 'error');
                if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
            }
        };

        // ---- refresh ----
        window.refreshData = function() {
            const params = new URLSearchParams(window.location.search);
            const secret = params.get('secretcode');
            if (secret) {
                fetchData(secret);
                showToast('Refreshed', 'success');
            }
        };

        // ---- helpers ----
        function showError(msg) {
            errorEl.textContent = '❌ ' + msg;
            errorEl.classList.remove('hidden');
        }
        function hideError() { errorEl.classList.add('hidden'); }

        window.logout = function() {
            window.location.href = 'https://workfrommobile.pages.dev/';
        };

        // ---- init ----
        function init() {
            const params = new URLSearchParams(window.location.search);
            const secret = params.get('secretcode');
            if (!secret) {
                window.location.href = 'https://workfrommobile.pages.dev/';
                return;
            }
            fetchData(secret);
        }

        init();
    })();
</script>
</body>
</html>
