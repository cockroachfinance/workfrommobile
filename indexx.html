<script>
    (function() {
      "use strict";

      // ========== CONFIG ==========
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8RbIZ7fj3SnIunN3hW2_lj84YDX6kIYry7EoePxHZsFkN4AWX7bJI-Zei0PDd_okF/exec';

      // ========== DOM REFS ==========
      const overlay = document.getElementById('popupOverlay');
      const passwordPopup = document.getElementById('passwordPopup');
      const confirmPopup = document.getElementById('confirmPopup');
      const loginPopup = document.getElementById('loginPopup');
      const successPopup = document.getElementById('successPopup');
      
      const openBtns = [document.getElementById('openPopupBtn'), document.getElementById('openPopupBtn2')];
      const closeBtn = document.getElementById('closePopupBtn');
      const closePasswordBtn = document.getElementById('closePasswordPopup');
      const closeConfirmBtn = document.getElementById('closeConfirmPopup');
      const closeLoginBtn = document.getElementById('closeLoginBtn');
      const closeSuccessBtn = document.getElementById('closeSuccessPopup');
      const openLoginBtn = document.getElementById('openLoginBtn');
      const switchToSignup = document.getElementById('switchToSignup');
      const goToLoginBtn = document.getElementById('goToLoginBtn');
      const continueHomeBtn = document.getElementById('continueHomeBtn');
      
      const form = document.getElementById('signupForm');
      const passwordForm = document.getElementById('passwordForm');
      const confirmForm = document.getElementById('confirmForm');
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');
      const attemptsSpan = document.getElementById('attemptsLeft');
      
      const testimonialsContainer = document.getElementById('testimonialsContainer');
      const faqContainer = document.getElementById('faqContainer');
      const memberCountEl = document.getElementById('memberCount');
      const paidOutEl = document.getElementById('paidOut');

      let userData = {};
      let tempPassword = '';
      let loginAttempts = 3;
      let dynamicDataLoaded = false;

      // ========== FETCH DYNAMIC DATA ==========
      function fetchDynamicData() {
        if (dynamicDataLoaded) return;
        const url = SCRIPT_URL + '?action=getData&format=json';
        fetch(url)
          .then(res => {
            if (!res.ok) throw new Error('Network error');
            return res.json();
          })
          .then(data => {
            if (data.success) {
              if (data.testimonials && data.testimonials.length) {
                testimonialsContainer.innerHTML = data.testimonials.map(t => 
                  `<div class="testimonial"><p>"${t.text}"</p><strong>– ${t.name}</strong></div>`
                ).join('');
              }
              if (data.faqs && data.faqs.length) {
                faqContainer.innerHTML = data.faqs.map((faq, idx) => `
                  <div class="faq-item">
                    <div class="faq-question">
                      <span>${faq.question}</span>
                      <button class="faq-toggle" data-idx="${idx}"><i class="fas fa-chevron-down"></i></button>
                    </div>
                    <div class="faq-answer"><p>${faq.answer}</p></div>
                  </div>
                `).join('');
                document.querySelectorAll('.faq-toggle').forEach(btn => {
                  btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const faqItem = this.closest('.faq-item');
                    const answer = faqItem.querySelector('.faq-answer');
                    const icon = this.querySelector('i');
                    answer.classList.toggle('open');
                    icon.className = answer.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
                  });
                });
              }
              if (data.stats) {
                if (data.stats.members) memberCountEl.textContent = data.stats.members;
                if (data.stats.paidOut) paidOutEl.textContent = data.stats.paidOut;
              }
              dynamicDataLoaded = true;
            }
          })
          .catch(err => console.warn('Could not load dynamic data:', err));
      }
      fetchDynamicData();

      // ========== TASK CARDS CLICK ==========
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', function() {
          openLoginPopup();
        });
      });

      // ========== POPUP HELPERS ==========
      function openPopup() {
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        form.reset();
      }
      function closePopup() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        form.reset();
      }
      function openPasswordPopup() {
        passwordPopup.classList.add('active');
        document.getElementById('userPassword').value = '';
      }
      function closePasswordPopup() {
        passwordPopup.classList.remove('active');
        document.getElementById('userPassword').value = '';
      }
      function openConfirmPopup() {
        confirmPopup.classList.add('active');
        document.getElementById('userConfirmPassword').value = '';
        document.getElementById('passwordError').classList.remove('show');
      }
      function closeConfirmPopup() {
        confirmPopup.classList.remove('active');
        document.getElementById('userConfirmPassword').value = '';
        document.getElementById('passwordError').classList.remove('show');
      }
      function openLoginPopup() {
        loginPopup.classList.add('active');
        document.body.style.overflow = 'hidden';
        document.getElementById('loginForm').reset();
        loginError.classList.add('hidden');
        loginAttempts = 3;
        attemptsSpan.textContent = loginAttempts;
      }
      function closeLoginPopup() {
        loginPopup.classList.remove('active');
        document.body.style.overflow = '';
        document.getElementById('loginForm').reset();
        loginError.classList.add('hidden');
        loginAttempts = 3;
        attemptsSpan.textContent = loginAttempts;
      }
      function openSuccessPopup() {
        successPopup.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      function closeSuccessPopup() {
        successPopup.classList.remove('active');
        document.body.style.overflow = '';
      }

      // ========== EVENT LISTENERS ==========
      openBtns.forEach(btn => btn.addEventListener('click', openPopup));
      closeBtn.addEventListener('click', closePopup);
      openLoginBtn.addEventListener('click', openLoginPopup);
      closeLoginBtn.addEventListener('click', closeLoginPopup);
      closeSuccessBtn.addEventListener('click', closeSuccessPopup);
      
      goToLoginBtn.addEventListener('click', function() {
        closeSuccessPopup();
        openLoginPopup();
      });
      continueHomeBtn.addEventListener('click', function() {
        closeSuccessPopup();
      });
      switchToSignup.addEventListener('click', function(e) {
        e.preventDefault();
        closeLoginPopup();
        openPopup();
      });
      closePasswordBtn.addEventListener('click', closePasswordPopup);
      closeConfirmBtn.addEventListener('click', closeConfirmPopup);

      // ========== SIGNUP FLOW ==========
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('userName').value.trim();
        const mobile = document.getElementById('userMobile').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        if (!name || !mobile) {
          alert('Please fill in Name and Mobile number.');
          return;
        }
        if (!/^\d{10,15}$/.test(mobile)) {
          alert('Please enter a valid mobile number (10-15 digits).');
          return;
        }
        userData = { name, mobile, email: email || 'not provided' };
        closePopup();
        openPasswordPopup();
      });

      passwordForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const password = document.getElementById('userPassword').value;
        if (password.length < 6) {
          alert('Password must be at least 6 characters long.');
          return;
        }
        tempPassword = password;
        closePasswordPopup();
        openConfirmPopup();
      });

      confirmForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const confirmPassword = document.getElementById('userConfirmPassword').value;
        const errorEl = document.getElementById('passwordError');
        if (confirmPassword !== tempPassword) {
          errorEl.classList.add('show');
          return;
        }
        errorEl.classList.remove('show');
        
        const submitBtn = confirmForm.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
        
        const registerUrl = SCRIPT_URL + 
          '?action=register' +
          '&name=' + encodeURIComponent(userData.name) +
          '&mobile=' + encodeURIComponent(userData.mobile) +
          '&email=' + encodeURIComponent(userData.email) +
          '&password=' + encodeURIComponent(tempPassword) +
          '&format=json';
        
        fetch(registerUrl)
          .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.json();
          })
          .then(data => {
            if (data.success) {
              closeConfirmPopup();
              const successMsg = document.querySelector('#successPopup p');
              if (successMsg) {
                successMsg.innerHTML = 'Welcome to the Work From Mobile family!<br>Your account is pending admin approval.<br>You will be notified once approved.';
              }
              openSuccessPopup();
              userData = {};
              tempPassword = '';
              form.reset();
            } else {
              alert('Registration failed: ' + (data.message || 'Unknown error'));
            }
          })
          .catch(err => {
            console.error('Registration error:', err);
            alert('⚠️ Could not connect to server. Please try again later.');
          })
          .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-check" style="margin-right:8px;"></i> Create Account';
          });
      });

      // ========== LOGIN ==========
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const mobile = document.getElementById('loginMobile').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!mobile || !password) {
          alert('Please enter both mobile number and password.');
          return;
        }

        if (loginAttempts <= 0) {
          alert('Too many failed attempts. Please try again later.');
          return;
        }

        loginError.classList.add('hidden');

        const loginUrl = SCRIPT_URL + 
          '?action=login' +
          '&mobile=' + encodeURIComponent(mobile) +
          '&password=' + encodeURIComponent(password) +
          '&format=json';

        const submitBtn = document.getElementById('loginSubmitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

        fetch(loginUrl)
          .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.json();
          })
          .then(data => {
            console.log('Login response:', data);
            
            if (data.success === true) {
              // Login successful - redirect
              const redirectUrl = data.redirectUrl || 'https://workfrommobile.pages.dev/dashboard/?secretcode=' + (data.user && data.user.secretCode ? data.user.secretCode : '');
              window.location.href = redirectUrl;
            } else {
              // Login failed
              loginAttempts--;
              attemptsSpan.textContent = loginAttempts;
              loginError.classList.remove('hidden');
              
              let msg = 'Invalid credentials.';
              if (data.status === 'pending') {
                msg = '🔔 Account pending approval. Please wait for admin approval.';
              } else if (data.status === 'blocked') {
                msg = '⛔ Account blocked. Contact support.';
              } else if (data.message) {
                msg = data.message;
              }
              
              loginError.textContent = msg + ' (Attempts left: ' + loginAttempts + ')';
              
              if (loginAttempts <= 0) {
                alert('Too many failed attempts. Please try again later.');
                closeLoginPopup();
              }
            }
          })
          .catch(err => {
            console.error('Login error:', err);
            alert('⚠️ Could not connect to server. Please try again later.');
          })
          .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i> Login';
          });
      });

    })();
  </script>
