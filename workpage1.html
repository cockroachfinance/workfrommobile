<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon {
            font-size: 3rem;
            color: #2a7de1;
            margin-bottom: 1rem;
        }
        h1 {
            color: #0b1e33;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #6f8aa8;
            margin-bottom: 2rem;
        }
        .loading {
            color: #36618b;
            padding: 1rem 0;
        }
        .error {
            background: #fee9e7;
            color: #b13e2e;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .success {
            background: #e3f0fa;
            color: #1a4d7a;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .hidden {
            display: none;
        }
        .badge {
            background: #e9edf4;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #1e3b5c;
            display: inline-block;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="icon">🔐</div>
        <h1>Secure Tracker</h1>
        <p class="subtitle">Checking your access...</p>
        
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-pulse"></i> Verifying secret code...
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        (function() {
            // Replace with your Web App URL
            const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyqWCOP-mNCY_VPMhWTihK--MdKyHqF-yUjz6TyABLwg6-Cb4mKYEoOzrqDaVKUzxj54w/exec';
            
            const loadingEl = document.getElementById('loading');
            const resultEl = document.getElementById('result');
            
            async function validateSecret() {
                // Get secret from URL
                const params = new URLSearchParams(window.location.search);
                const secret = params.get('secretcode');
                
                // If no secret, redirect to home
                if (!secret) {
                    window.location.href = 'https://workfrommobile.pages.dev/';
                    return;
                }
                
                try {
                    // Call the validator
                    const response = await fetch(`${WEB_APP_URL}?secretcode=${encodeURIComponent(secret)}`);
                    const data = await response.json();
                    
                    loadingEl.classList.add('hidden');
                    
                    if (data.success) {
                        // Valid secret - show success
                        resultEl.innerHTML = `
                            <div class="success">
                                ✅ <strong>Access Granted</strong>
                                <p style="margin-top:0.5rem;font-size:0.9rem;">Welcome! You have valid access.</p>
                            </div>
                            <div class="badge">🔐 ${secret.substring(0,6)}...</div>
                        `;
                    } else {
                        // Invalid secret - redirect to home
                        resultEl.innerHTML = `
                            <div class="error">
                                ❌ <strong>Access Denied</strong>
                                <p style="margin-top:0.5rem;font-size:0.9rem;">Invalid secret code. Redirecting...</p>
                            </div>
                        `;
                        setTimeout(() => {
                            window.location.href = 'https://workfrommobile.pages.dev/';
                        }, 2000);
                    }
                } catch (error) {
                    loadingEl.classList.add('hidden');
                    resultEl.innerHTML = `
                        <div class="error">
                            ❌ <strong>Error</strong>
                            <p style="margin-top:0.5rem;font-size:0.9rem;">${error.message || 'Network error'}</p>
                        </div>
                    `;
                    setTimeout(() => {
                        window.location.href = 'https://workfrommobile.pages.dev/';
                    }, 3000);
                }
            }
            
            // Start validation
            validateSecret();
        })();
    </script>
</body>
</html>
