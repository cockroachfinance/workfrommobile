<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>work · secure tracker</title>
    <!-- Font Awesome Icons (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .glass-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -10px rgba(0, 20, 40, 0.25);
            padding: 2rem 2rem 2.8rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        h1 i {
            color: #2a7de1;
            font-size: 2rem;
        }
        .badge-secret {
            background: #e9edf4;
            padding: 0.25rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e3b5c;
            margin-left: 0.75rem;
            letter-spacing: 0.3px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            margin: 2rem 0 2.5rem;
        }
        .stat-box {
            background: white;
            padding: 1.4rem 0.8rem;
            border-radius: 2rem;
            box-shadow: 0 8px 18px -6px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid #ffffff70;
            transition: 0.15s;
        }
        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 24px -10px rgba(0, 40, 80, 0.12);
        }
        .stat-box .num {
            font-size: 2.7rem;
            font-weight: 700;
            color: #0b2b4a;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .stat-box .label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #4a617c;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 0.2rem;
        }
        .stat-box .icon {
            font-size: 1.6rem;
            color: #2a7de1;
            margin-bottom: 0.2rem;
        }
        .stat-box.balance .num { color: #0f7b3a; }
        .stat-box.viewed .num { color: #b45b0e; }
        .stat-box.total .num { color: #1f509e; }

        .url-section {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem 1.5rem 1.2rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
            border: 1px solid #eef3f9;
        }
        .url-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .url-header h3 {
            font-weight: 600;
            color: #1c3b5c;
            font-size: 1.2rem;
        }
        .url-header h3 i {
            margin-right: 0.6rem;
            color: #2a7de1;
        }
        .url-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .url-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8faff;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #e3ebf5;
            transition: 0.1s;
        }
        .url-item:hover {
            background: #f0f6ff;
            border-color: #b7cef0;
        }
        .url-item .url-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1d3c61;
            word-break: break-all;
            padding-right: 1rem;
        }
        .url-item .url-id {
            background: #dce6f2;
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1a3760;
        }
        .click-btn {
            background: #1f509e;
            border: none;
            color: white;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(28, 78, 168, 0.2);
            border: 1px solid #2a6bcb;
        }
        .click-btn i { font-size: 0.7rem; }
        .click-btn:hover {
            background: #123b7a;
            transform: scale(0.97);
            box-shadow: 0 2px 6px rgba(20, 60, 140, 0.3);
        }
        .click-btn:active { transform: scale(0.94); }

        .footnote {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6f8aa8;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            border-top: 1px solid #dde6f0;
            padding-top: 1.5rem;
        }
        .footnote span i { margin-right: 0.3rem; }
        .loading {
            text-align: center;
            padding: 2rem 0;
            color: #36618b;
        }
        .alert-box {
            background: #ffecdf;
            padding: 1.2rem 2rem;
            border-radius: 60px;
            color: #a1421a;
            font-weight: 500;
            border-left: 6px solid #d95c1a;
        }
        .hidden { display: none; }
        .btn-reset {
            background: transparent;
            border: 1px solid #b4c8e0;
            padding: 0.25rem 1.2rem;
            border-radius: 40px;
            color: #1f3b5a;
            font-weight: 500;
        }
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .glass-card { padding: 1.5rem; }
            .url-item { flex-wrap: wrap; gap: 0.6rem; }
        }
    </style>
</head>
<body>
<div class="glass-card" id="appContainer">
    <!-- header -->
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h1>
            <i class="fas fa-shield-alt"></i> Work<span style="font-weight:300;">·</span>track
            <span class="badge-secret" id="secretBadge">🔐 secret</span>
        </h1>
        <div style="display: flex; gap: 0.5rem;">
            <span id="sheetStatus" style="background:#eef3f9; padding:0.2rem 1rem; border-radius:60px; font-size:0.75rem; color:#1f4b78;"><i class="far fa-clock"></i> live</span>
        </div>
    </div>

    <!-- stats boxes -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-box total"><div class="icon"><i class="fas fa-video"></i></div><div class="num" id="totalVideos">—</div><div class="label">Total videos</div></div>
        <div class="stat-box viewed"><div class="icon"><i class="fas fa-eye"></i></div><div class="num" id="viewedVideos">—</div><div class="label">Viewed</div></div>
        <div class="stat-box balance"><div class="icon"><i class="fas fa-arrow-right"></i></div><div class="num" id="balanceVideos">—</div><div class="label">Balance</div></div>
    </div>

    <!-- url list -->
    <div class="url-section">
        <div class="url-header">
            <h3><i class="fas fa-link"></i> URL sheet · click to log</h3>
            <span style="font-size:0.75rem; background:#e6eefa; padding:0.2rem 0.9rem; border-radius:40px;" id="urlCount">0 urls</span>
        </div>
        <div id="urlListContainer">
            <div class="loading" id="loadingUrls"><i class="fas fa-spinner fa-pulse"></i> loading urls...</div>
            <div id="urlItems" class="url-list"></div>
        </div>
    </div>

    <div class="footnote">
        <span><i class="far fa-calendar-alt"></i> <span id="currentTime"></span></span>
        <span><i class="fas fa-database"></i> sheet: <span id="sheetNameDisplay">—</span></span>
        <span style="opacity:0.7;"><i class="fas fa-code"></i> auto-log on click</span>
    </div>
    <div id="messageBox" style="margin-top: 0.8rem; font-size:0.9rem;"></div>
</div>

<script>
    (function() {
        // ============================================================
        // 🔧 CONFIGURATION: Add your AppScript Web App URL here
        // ============================================================
        const APPSCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjofGTPL5Wq-EVYiufvEasjsF_pAoKdx21QCLOHHlhEIMo84_Ku9KfzjtyQxZIj7WC9A/exec';
        // Example: 'https://script.google.com/macros/s/ABCDEFGHIJKLMNOPQRSTUVWXYZ/exec'
        // ============================================================

        // Determine if we're running in the AppScript environment
        // If the page is loaded from the AppScript URL, google.script.run is available
        const isAppScriptEnvironment = (typeof google !== 'undefined' && google.script && google.script.run);
        
        // If we're not in AppScript environment but have a URL, we use fetch API
        const useFetchAPI = !isAppScriptEnvironment && APPSCRIPT_URL && APPSCRIPT_URL.includes('script.google.com');

        // DOM refs
        const totalEl = document.getElementById('totalVideos');
        const viewedEl = document.getElementById('viewedVideos');
        const balanceEl = document.getElementById('balanceVideos');
        const urlItemsContainer = document.getElementById('urlItems');
        const loadingUrls = document.getElementById('loadingUrls');
        const urlCountSpan = document.getElementById('urlCount');
        const sheetNameDisplay = document.getElementById('sheetNameDisplay');
        const currentTimeSpan = document.getElementById('currentTime');
        const messageBox = document.getElementById('messageBox');
        const secretBadge = document.getElementById('secretBadge');

        // state
        let currentSecret = '';
        let urlData = [];
        let stats = { total: 0, viewed: 0, balance: 0 };

        // ---------- helper: show message ----------
        function showMessage(msg, isError = false) {
            messageBox.innerHTML = `<span style="background:${isError?'#fee9e7':'#e3f0fa'}; padding:0.3rem 1.5rem; border-radius:40px; color:${isError?'#b13e2e':'#1a4d7a'};">${msg}</span>`;
            setTimeout(() => { messageBox.innerHTML = ''; }, 4000);
        }

        // ---------- update UI stats ----------
        function updateStatsUI(s) {
            totalEl.textContent = s.total ?? 0;
            viewedEl.textContent = s.viewed ?? 0;
            balanceEl.textContent = s.balance ?? 0;
        }

        // ---------- render URL list ----------
        function renderUrls(urls) {
            urlItemsContainer.innerHTML = '';
            if (!urls || urls.length === 0) {
                urlItemsContainer.innerHTML = '<div style="padding:1.2rem; text-align:center; color:#687e9a;"><i class="fas fa-link"></i> no urls in sheet</div>';
                urlCountSpan.textContent = '0 urls';
                return;
            }
            urlCountSpan.textContent = urls.length + ' urls';
            urls.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'url-item';
                div.innerHTML = `
                    <span class="url-text"><i class="fas fa-arrow-right" style="color:#2a7de1; margin-right:8px;"></i>${item.url}</span>
                    <span style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
                        <span class="url-id">#${item.id || idx+1}</span>
                        <button class="click-btn" data-id="${item.id || idx+1}" data-url="${item.url}" data-index="${idx}"><i class="fas fa-mouse-pointer"></i> click</button>
                    </span>
                `;
                urlItemsContainer.appendChild(div);
            });

            document.querySelectorAll('.click-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const url = this.dataset.url;
                    const id = this.dataset.id;
                    handleUrlClick(url, id);
                });
            });
        }

        // ---------- API call via fetch (for standalone HTML) ----------
        function callAppScriptAPI(action, params) {
            return new Promise((resolve, reject) => {
                if (isAppScriptEnvironment) {
                    // Use google.script.run
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        [action](...params);
                } else if (useFetchAPI) {
                    // Use fetch with JSONP or POST
                    const url = APPSCRIPT_URL + '?action=' + action + '&' + new URLSearchParams(params).toString();
                    fetch(url, {
                        method: 'GET',
                        mode: 'no-cors', // for simple web app access
                        headers: { 'Content-Type': 'application/json' }
                    })
                    .then(response => {
                        // With no-cors, we can't read response, so we use a workaround
                        // Actually, we need to use JSONP or deploy with CORS
                        // For now, we'll use a hidden iframe approach or just show a message
                        reject(new Error('Fetch with no-cors cannot read response. Deploy as Web App and use google.script.run.'));
                    })
                    .catch(reject);
                } else {
                    reject(new Error('No valid API method available. Please deploy as Web App.'));
                }
            });
        }

        // ---------- handle url click ----------
        function handleUrlClick(url, id) {
            if (!currentSecret) {
                showMessage('❌ secret missing', true);
                return;
            }
            
            // Optimistic UI update
            stats.viewed = (stats.viewed || 0) + 1;
            stats.balance = Math.max(0, (stats.total || 0) - (stats.viewed || 0));
            updateStatsUI(stats);
            showMessage(`📌 logging: ${url.substring(0,40)}...`);

            if (isAppScriptEnvironment) {
                google.script.run
                    .withSuccessHandler((resp) => {
                        if (resp && resp.success) {
                            stats.total = resp.total || stats.total;
                            stats.viewed = resp.viewed || stats.viewed;
                            stats.balance = resp.balance || stats.balance;
                            updateStatsUI(stats);
                            showMessage('✅ updated +1 viewed');
                        } else {
                            showMessage('⚠️ ' + (resp?.message || 'error'), true);
                        }
                    })
                    .withFailureHandler((err) => {
                        showMessage('❌ server error: ' + err.message, true);
                    })
                    .logUrlClick(currentSecret, url, id);
            } else {
                showMessage('📡 AppScript not available. Use the Web App URL.', true);
            }
        }

        // ---------- fetch data ----------
        function fetchData(secret) {
            if (!secret) return;
            currentSecret = secret;
            sheetNameDisplay.textContent = secret.substring(0,6)+'…';

            if (isAppScriptEnvironment) {
                google.script.run
                    .withSuccessHandler((response) => {
                        if (response && response.stats) {
                            stats = response.stats;
                            updateStatsUI(stats);
                        }
                        if (response && response.urls) {
                            urlData = response.urls;
                            renderUrls(urlData);
                        } else {
                            renderUrls([]);
                        }
                        if (response && response.secret) {
                            secretBadge.textContent = '🔐 ' + response.secret.substring(0,4)+'…';
                        }
                        loadingUrls.classList.add('hidden');
                    })
                    .withFailureHandler((err) => {
                        loadingUrls.classList.add('hidden');
                        urlItemsContainer.innerHTML = `<div class="alert-box"><i class="fas fa-exclamation-triangle"></i> ${err.message || 'server error'}</div>`;
                        showMessage('⚠️ failed to load data', true);
                    })
                    .getDataForSecret(secret);
            } else {
                // If not in AppScript environment, show instructions
                loadingUrls.classList.add('hidden');
                urlItemsContainer.innerHTML = `
                    <div class="alert-box" style="background:#e8f0fe; border-left-color:#2a7de1; color:#1a4d7a;">
                        <i class="fas fa-info-circle"></i> 
                        Please access this page via the AppScript Web App URL to use all features.
                        <br><small>Current URL: ${APPSCRIPT_URL}</small>
                    </div>
                `;
                showMessage('📡 Please use the Web App URL', true);
            }
        }

        // ---------- extract secret from URL ----------
        function getSecretFromURL() {
            const params = new URLSearchParams(window.location.search);
            const secret = params.get('secretcode');
            return secret;
        }

        // ---------- init ----------
        function init() {
            function updateClock() {
                const now = new Date();
                currentTimeSpan.textContent = now.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
            updateClock();
            setInterval(updateClock, 10000);

            const secret = getSecretFromURL();
            if (!secret) {
                window.location.href = 'https://workfrommobile.pages.dev/';
                return;
            }
            currentSecret = secret;
            secretBadge.textContent = '🔐 ' + secret.substring(0,4)+'…';
            fetchData(secret);
        }

        window.__app = { init, fetchData, handleUrlClick };
        init();
    })();
</script>
</body>
</html>
