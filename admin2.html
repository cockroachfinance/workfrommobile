<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Manager - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #e8ecf1; padding-bottom: 10px; }
        .tab-btn { padding: 12px 24px; border: none; background: transparent; font-size: 16px; font-weight: 500; color: #5f6b7a; cursor: pointer; border-radius: 8px; transition: all 0.3s ease; }
        .tab-btn:hover { background: #f0f2f5; }
        .tab-btn.active { background: #0066ff; color: white; }
        .tab-content { display: none; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 25px; margin-top: 20px; }
        .tab-content.active { display: block; }
        .upload-area { display: flex; flex-direction: column; gap: 20px; }
        .input-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .input-group input { flex: 1; padding: 12px 18px; border: 2px solid #dce0e6; border-radius: 8px; font-size: 14px; min-width: 300px; }
        .input-group input:focus { outline: none; border-color: #0066ff; }
        .btn { padding: 12px 28px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: #0066ff; color: white; }
        .btn-primary:hover { background: #0052cc; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,102,255,0.3); }
        .btn-primary:disabled { background: #b0b8c4; cursor: not-allowed; transform: none; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .url-list { margin-top: 20px; }
        .url-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #e8ecf1; gap: 15px; flex-wrap: wrap; }
        .url-item:last-child { border-bottom: none; }
        .url-info { display: flex; align-items: center; gap: 15px; flex: 1; min-width: 200px; }
        .url-slno { background: #f0f2f5; padding: 4px 10px; border-radius: 4px; font-weight: 600; color: #1a2332; font-size: 13px; min-width: 50px; text-align: center; }
        .url-text { word-break: break-all; color: #1a2332; }
        .url-text a { color: #0066ff; text-decoration: none; }
        .url-text a:hover { text-decoration: underline; }
        .url-id { color: #5f6b7a; font-size: 12px; background: #f0f2f5; padding: 2px 8px; border-radius: 4px; }
        .url-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-outline { background: transparent; border: 2px solid #dce0e6; color: #5f6b7a; }
        .btn-outline:hover { background: #f0f2f5; }
        .message { padding: 12px 16px; border-radius: 8px; margin: 10px 0; font-weight: 500; }
        .message.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .message.error { background: #fbe9e7; color: #c62828; border-left: 4px solid #c62828; }
        .message.info { background: #e3f2fd; color: #0d47a1; border-left: 4px solid #0d47a1; }
        .stats { display: flex; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .stat-card { background: #f8f9fa; padding: 12px 20px; border-radius: 8px; flex: 1; min-width: 150px; }
        .stat-card label { display: block; font-size: 12px; color: #5f6b7a; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 24px; font-weight: 600; color: #1a2332; margin-top: 5px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(0,102,255,0.2); border-top-color: #0066ff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { display: inline-flex; align-items: center; gap: 8px; }
        .empty-state { text-align: center; padding: 40px 20px; color: #5f6b7a; }
        .empty-state .icon { font-size: 48px; margin-bottom: 10px; }
        .batch-input { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #e8ecf1; }
        .batch-input textarea { width: 100%; min-height: 100px; padding: 12px; border: 2px solid #dce0e6; border-radius: 8px; font-family: inherit; font-size: 14px; resize: vertical; }
        .batch-input textarea:focus { outline: none; border-color: #0066ff; }
        .batch-input .helper-text { color: #5f6b7a; font-size: 13px; margin-top: 5px; }
        @media (max-width: 600px) {
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; text-align: center; }
            .input-group { flex-direction: column; }
            .input-group input { min-width: auto; width: 100%; }
            .url-item { flex-direction: column; align-items: stretch; }
            .url-actions { justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="tabs">
                <button class="tab-btn active" data-tab="upload" onclick="switchTab('upload')">📤 Upload URL</button>
                <button class="tab-btn" data-tab="view" onclick="switchTab('view')">📋 View URLs</button>
            </div>
        </div>

        <div id="uploadTab" class="tab-content active">
            <div class="upload-area">
                <h2>📤 Upload New URL</h2>
                <p style="color: #5f6b7a; margin-bottom: 15px;">Paste a URL below and click upload. It will be added to Sheet2 with automatic SL No.</p>
                
                <div class="input-group">
                    <input type="url" id="urlInput" placeholder="https://example.com/page" onkeyup="if(event.key==='Enter') uploadUrl()">
                    <button class="btn btn-primary" id="uploadBtn" onclick="uploadUrl()">Upload URL</button>
                </div>
                
                <div id="uploadMessage"></div>
                
                <div class="batch-input">
                    <h3>📦 Bulk Upload</h3>
                    <p style="color: #5f6b7a; margin-bottom: 10px;">Paste multiple URLs (one per line) for batch upload:</p>
                    <textarea id="batchUrls" placeholder="https://example.com/1&#10;https://example.com/2&#10;https://example.com/3"></textarea>
                    <div class="helper-text">💡 Each URL will be added with automatic SL No</div>
                    <button class="btn btn-success" style="margin-top:10px;" onclick="bulkUpload()">Upload All URLs</button>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <label>Total URLs in Sheet2</label>
                        <div class="value" id="totalUrls">0</div>
                    </div>
                    <div class="stat-card">
                        <label>Last Uploaded</label>
                        <div class="value" id="lastUploaded">-</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="viewTab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                <h2>📋 All URLs in Sheet2</h2>
                <button class="btn btn-primary" onclick="loadUrls()">🔄 Refresh</button>
            </div>
            <div id="urlListContainer"><div class="empty-state"><div class="icon">📭</div><p>Loading URLs...</p></div></div>
        </div>
    </div>

    <script>
        // IMPORTANT: Use the SAME script URL for both pages
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzga1u7OrTzup4pKut14q5w-lM5PV8NBKDPFHRBzSf28KqZ5YOWZcM2ne2vl5qiDuF1/exec';
        const ADMIN_SECRET = 'kahUZ3Ti61LuE4PZ';
        
        let isAuthenticated = false;

        document.addEventListener('DOMContentLoaded', function() {
            authenticate();
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
            if (tabName === 'view') loadUrls();
        }

        async function authenticate() {
            try {
                const response = await fetch(`${SCRIPT_URL}?secretcode=${ADMIN_SECRET}`);
                const data = await response.json();
                if (data.success) {
                    isAuthenticated = true;
                    document.getElementById('totalUrls').textContent = data.totalItems || 0;
                    document.getElementById('uploadBtn').disabled = false;
                    if (document.getElementById('viewTab').classList.contains('active')) loadUrls();
                } else {
                    isAuthenticated = false;
                    showMessage('Authentication failed: ' + (data.error || 'Invalid secret code'), 'error');
                    document.getElementById('uploadBtn').disabled = true;
                }
            } catch (error) {
                isAuthenticated = false;
                showMessage('Error: ' + error.message, 'error');
                document.getElementById('uploadBtn').disabled = true;
            }
        }

        function showMessage(message, type = 'info', containerId = 'uploadMessage') {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        async function uploadUrl() {
            if (!isAuthenticated) {
                showMessage('Authentication failed. Please check admin secret.', 'error');
                return;
            }
            
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            
            if (!url) {
                showMessage('Please enter a valid URL', 'error');
                return;
            }
            
            try { new URL(url); } catch (e) {
                showMessage('Please enter a valid URL (include http:// or https://)', 'error');
                return;
            }
            
            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-text"><span class="spinner"></span> Uploading...</span>';
            btn.disabled = true;
            
            try {
                const formData = new FormData();
                formData.append('secretcode', ADMIN_SECRET);
                formData.append('action', 'uploadUrl');
                formData.append('url', url);
                
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`✅ URL uploaded successfully! SL No: ${data.slNo}`, 'success');
                    document.getElementById('totalUrls').textContent = data.totalUrls || 0;
                    document.getElementById('lastUploaded').textContent = data.slNo || '-';
                    urlInput.value = '';
                    if (document.getElementById('viewTab').classList.contains('active')) loadUrls();
                } else {
                    showMessage('❌ Upload failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function bulkUpload() {
            if (!isAuthenticated) {
                showMessage('Authentication failed. Please check admin secret.', 'error');
                return;
            }
            
            const textarea = document.getElementById('batchUrls');
            const urls = textarea.value.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            
            if (urls.length === 0) {
                showMessage('Please enter at least one URL', 'error');
                return;
            }
            
            const validUrls = [];
            const invalidUrls = [];
            urls.forEach(url => {
                try { new URL(url); validUrls.push(url); } catch (e) { invalidUrls.push(url); }
            });
            
            if (invalidUrls.length > 0) {
                showMessage(`⚠️ ${invalidUrls.length} invalid URLs found. Only valid URLs will be uploaded.`, 'info');
            }
            
            if (validUrls.length === 0) {
                showMessage('No valid URLs to upload', 'error');
                return;
            }
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="loading-text"><span class="spinner"></span> Uploading ${validUrls.length} URLs...</span>`;
            btn.disabled = true;
            
            let successCount = 0;
            let failCount = 0;
            let lastSlNo = 0;
            
            for (const url of validUrls) {
                try {
                    const formData = new FormData();
                    formData.append('secretcode', ADMIN_SECRET);
                    formData.append('action', 'uploadUrl');
                    formData.append('url', url);
                    
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        successCount++;
                        lastSlNo = data.slNo;
                    } else {
                        failCount++;
                    }
                } catch (error) {
                    failCount++;
                }
            }
            
            btn.innerHTML = originalText;
            btn.disabled = false;
            
            showMessage(`✅ Upload complete! ${successCount} uploaded successfully, ${failCount} failed.`, successCount > 0 ? 'success' : 'error');
            
            const totalEl = document.getElementById('totalUrls');
            totalEl.textContent = parseInt(totalEl.textContent) + successCount;
            if (lastSlNo) document.getElementById('lastUploaded').textContent = lastSlNo;
            textarea.value = '';
            if (document.getElementById('viewTab').classList.contains('active')) loadUrls();
        }

        async function loadUrls() {
            if (!isAuthenticated) {
                document.getElementById('urlListContainer').innerHTML = `
                    <div class="empty-state"><div class="icon">🔒</div><p>Authentication failed. Please check admin secret.</p></div>
                `;
                return;
            }
            
            const container = document.getElementById('urlListContainer');
            container.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><p>Loading URLs...</p></div>`;
            
            try {
                const response = await fetch(`${SCRIPT_URL}?secretcode=${ADMIN_SECRET}&action=getAllUrls`);
                const data = await response.json();
                
                if (data.success && data.urls && data.urls.length > 0) {
                    let html = '<div class="url-list">';
                    data.urls.forEach(item => {
                        html += `
                            <div class="url-item">
                                <div class="url-info">
                                    <span class="url-slno">#${item.slNo}</span>
                                    <span class="url-text"><a href="${item.url}" target="_blank">${item.url}</a></span>
                                    ${item.id ? `<span class="url-id">ID: ${item.id}</span>` : ''}
                                </div>
                                <div class="url-actions">
                                    <button class="btn btn-sm btn-outline" onclick="copyUrl('${item.url}')">📋 Copy</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteUrl('${item.slNo}')">🗑️ Delete</button>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    html += `<div style="margin-top:15px;color:#5f6b7a;font-size:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                                <span>Total: <strong>${data.total}</strong> URLs</span>
                            </div>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `
                        <div class="empty-state"><div class="icon">📭</div><p>No URLs found in Sheet2.</p></div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state"><div class="icon">❌</div><p>Error loading URLs: ${error.message}</p></div>
                `;
            }
        }

        async function deleteUrl(slNo) {
            if (!confirm(`Are you sure you want to delete URL #${slNo}?`)) return;
            
            try {
                const formData = new FormData();
                formData.append('secretcode', ADMIN_SECRET);
                formData.append('action', 'deleteUrl');
                formData.append('slno', slNo);
                
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`✅ URL #${slNo} deleted successfully!`, 'success', 'uploadMessage');
                    loadUrls();
                    const totalEl = document.getElementById('totalUrls');
                    totalEl.textContent = parseInt(totalEl.textContent) - 1;
                } else {
                    showMessage('❌ Delete failed: ' + (data.error || 'Unknown error'), 'error', 'uploadMessage');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error', 'uploadMessage');
            }
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => {
                showMessage('✅ URL copied to clipboard!', 'success', 'uploadMessage');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = url;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showMessage('✅ URL copied to clipboard!', 'success', 'uploadMessage');
            });
        }
    </script>
</body>
</html>
