<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Google Sheet Data Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button.primary {
            background: #2196F3;
        }

        button.danger {
            background: #f44336;
        }

        .status-bar {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .status-bar.show {
            display: block;
        }

        .status-bar.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4CAF50;
        }

        .status-bar.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .status-bar.info {
            background: #e3f2fd;
            color: #0d47a1;
            border-left: 4px solid #2196F3;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tr:hover {
            background: #f5f5f5;
        }

        tr:nth-child(even) {
            background: #fafafa;
        }

        tr:nth-child(even):hover {
            background: #f0f0f0;
        }

        .stats {
            margin-top: 15px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 14px;
            color: #555;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            th, td {
                padding: 8px 6px;
                font-size: 12px;
            }
            h1 {
                font-size: 20px;
            }
            button {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            📊 Google Sheet Data Viewer
            <span id="loadingIndicator" style="display:none;">
                <span class="loader"></span>
            </span>
        </h1>
        <p class="subtitle">Connected to: <strong id="sheetIdDisplay">1IWjSyC0OnDyKhV7LfKTbChjqE-3vTquNMbXRJs0iwVE</strong></p>

        <div class="button-group">
            <button class="primary" onclick="fetchData()">📥 Load Data</button>
            <button onclick="refreshData()">🔄 Refresh</button>
            <button class="danger" onclick="clearData()">🗑️ Clear</button>
        </div>

        <div id="statusBar" class="status-bar"></div>

        <div id="dataContainer">
            <div class="empty-state">
                <div class="icon">📋</div>
                <p>Click <strong>"Load Data"</strong> to fetch data from your Google Sheet</p>
                <p style="font-size: 12px; color: #bbb; margin-top: 5px;">
                    Sheet ID: 1IWjSyC0OnDyKhV7LfKTbChjqE-3vTquNMbXRJs0iwVE
                </p>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        // Replace with your Cloudflare Worker URL
        const WORKER_URL = 'https://your-worker.your-subdomain.workers.dev';
        const SHEET_ID = '1IWjSyC0OnDyKhV7LfKTbChjqE-3vTquNMbXRJs0iwVE';

        // ===== DOM ELEMENTS =====
        const dataContainer = document.getElementById('dataContainer');
        const statusBar = document.getElementById('statusBar');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // ===== UTILITY FUNCTIONS =====
        function showStatus(message, type = 'info') {
            statusBar.textContent = message;
            statusBar.className = `status-bar show ${type}`;
            setTimeout(() => {
                statusBar.className = 'status-bar';
            }, 5000);
        }

        function setLoading(isLoading) {
            loadingIndicator.style.display = isLoading ? 'inline-block' : 'none';
        }

        function formatDate(dateString) {
            try {
                return new Date(dateString).toLocaleString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return dateString;
            }
        }

        // ===== MAIN FUNCTION: Fetch and Display Data =====
        async function fetchData() {
            setLoading(true);
            dataContainer.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <span class="loader"></span>
                    <p style="margin-top: 10px; color: #666;">Loading data from Google Sheet...</p>
                </div>
            `;

            try {
                const response = await fetch(`${WORKER_URL}/api/data`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error);
                }

                if (!result.headers || result.headers.length === 0) {
                    showStatus('⚠️ No data found in the sheet', 'error');
                    dataContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>No data found in your Google Sheet</p>
                            <p style="font-size: 12px; color: #bbb;">Make sure the sheet has headers and data</p>
                        </div>
                    `;
                    return;
                }

                // Display the data
                renderTable(result.headers, result.rows);
                showStatus(`✅ Loaded ${result.totalRows || result.rows.length} rows successfully!`, 'success');

            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
                dataContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p style="color: #d32f2f;">Failed to load data</p>
                        <p style="font-size: 12px; color: #999;">${error.message}</p>
                        <button onclick="fetchData()" style="margin-top: 15px;">🔄 Try Again</button>
                    </div>
                `;
            } finally {
                setLoading(false);
            }
        }

        // ===== RENDER TABLE =====
        function renderTable(headers, rows) {
            // Create table HTML
            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;">#</th>
                    `;

            // Headers
            headers.forEach(header => {
                html += `<th>${escapeHtml(header)}</th>`;
            });

            html += `
                            </tr>
                        </thead>
                        <tbody>
                    `;

            // Rows
            if (rows && rows.length > 0) {
                rows.forEach((row, index) => {
                    html += `<tr><td><strong>${index + 1}</strong></td>`;
                    
                    // Fill missing columns with empty string
                    for (let i = 0; i < headers.length; i++) {
                        const value = row[i] !== undefined ? row[i] : '';
                        html += `<td>${escapeHtml(formatValue(value))}</td>`;
                    }
                    
                    html += `</tr>`;
                });
            } else {
                html += `
                    <tr>
                        <td colspan="${headers.length + 1}" style="text-align: center; padding: 30px; color: #999;">
                            No data rows found. Add some data to your sheet!
                        </td>
                    </tr>
                `;
            }

            html += `
                        </tbody>
                    </table>
                </div>
                <div class="stats">
                    📊 Showing <strong>${rows ? rows.length : 0}</strong> rows • 
                    📋 <strong>${headers.length}</strong> columns • 
                    📅 Last updated: ${formatDate(new Date())}
                </div>
            `;

            dataContainer.innerHTML = html;
        }

        // ===== HELPER FUNCTIONS =====
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatValue(value) {
            if (value === null || value === undefined) return '';
            
            // Check if it's a date-like string
            if (typeof value === 'string') {
                const dateMatch = value.match(/^\d{4}-\d{2}-\d{2}/);
                if (dateMatch) {
                    return formatDate(value);
                }
            }
            
            return value;
        }

        // ===== OTHER FUNCTIONS =====
        async function refreshData() {
            showStatus('🔄 Refreshing data...', 'info');
            await fetchData();
        }

        function clearData() {
            dataContainer.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🗑️</div>
                    <p>Data cleared</p>
                    <p style="font-size: 12px; color: #999;">Click "Load Data" to view again</p>
                </div>
            `;
            showStatus('🗑️ Data cleared from view', 'info');
        }

        // ===== AUTO-LOAD ON PAGE LOAD =====
        document.addEventListener('DOMContentLoaded', () => {
            // Check if worker URL is configured
            if (WORKER_URL.includes('your-worker')) {
                showStatus('⚠️ Please update WORKER_URL with your Cloudflare Worker URL', 'error');
                dataContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚙️</div>
                        <p>Configuration Required</p>
                        <p style="font-size: 12px; color: #999;">
                            Update the <code>WORKER_URL</code> in the script to your Cloudflare Worker URL
                        </p>
                    </div>
                `;
            } else {
                // Auto-load data
                fetchData();
            }
        });
    </script>
</body>
</html>
