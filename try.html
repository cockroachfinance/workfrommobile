<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Sheet Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
        }
        h1 {
            font-size: 28px;
            color: #1a2a3a;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #5a6a7a;
            margin-bottom: 24px;
            font-size: 15px;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #5a6a7a;
            font-size: 18px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e0e7ef;
            border-top-color: #2a7de1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 500px;
        }
        th {
            background: #f8fafc;
            color: #1a2a3a;
            font-weight: 600;
            padding: 14px 16px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #edf2f7;
            color: #2d3a4a;
        }
        tr:hover td {
            background: #fafcff;
        }
        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #dc2626;
            margin: 20px 0;
        }
        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #8a9aa8;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Sheet Data</h1>
        <p class="subtitle">Data loaded from your published Google Sheet</p>
        <div id="data-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading data...</p>
            </div>
        </div>
        <div class="footer">
            Data refreshes automatically from the published sheet.
        </div>
    </div>

    <script>
        // === REPLACE THIS URL WITH YOUR PUBLISHED CSV LINK ===
        // To get the CSV link: In your sheet, go to File > Share > Publish to web
        // Choose "CSV" as the format and copy the link.
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSaQQ7aRUKELv0uOSWzKzTVA_kf-qsvRG_1xBRoBurgUAqBrrQ_XuelyHBwkKWK77CKjxFMd1zE2buu/pub?gid=0&single=true&output=csv';

        async function loadSheetData() {
            const container = document.getElementById('data-container');
            
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const csvText = await response.text();
                
                // Parse CSV
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                if (rows.length === 0) {
                    container.innerHTML = `<div class="error">⚠️ The sheet appears to be empty.</div>`;
                    return;
                }

                // Parse headers and data
                const headers = rows[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                const dataRows = rows.slice(1).map(row => {
                    // Simple CSV parsing (handles quoted commas)
                    const values = [];
                    let current = '';
                    let inQuotes = false;
                    for (let char of row) {
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            values.push(current.trim().replace(/^"|"$/g, ''));
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    values.push(current.trim().replace(/^"|"$/g, ''));
                    return values;
                });

                // Build HTML table
                let tableHTML = `<div class="table-wrapper"><table><thead><tr>`;
                headers.forEach(header => {
                    tableHTML += `<th>${header}</th>`;
                });
                tableHTML += `</tr></thead><tbody>`;
                
                dataRows.forEach(row => {
                    tableHTML += `<tr>`;
                    // Ensure we have the same number of columns
                    for (let i = 0; i < headers.length; i++) {
                        tableHTML += `<td>${row[i] || ''}</td>`;
                    }
                    tableHTML += `</tr>`;
                });
                tableHTML += `</tbody></table></div>`;
                
                container.innerHTML = tableHTML;

            } catch (error) {
                console.error('Error loading sheet:', error);
                container.innerHTML = `
                    <div class="error">
                        <strong>❌ Failed to load data</strong><br />
                        ${error.message}<br /><br />
                        <small>Make sure the sheet is published and the URL is correct.</small>
                    </div>
                `;
            }
        }

        // Load data when page loads
        loadSheetData();
    </script>
</body>
</html>
